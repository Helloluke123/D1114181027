<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速工坊：機車改裝大亨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="dashboard">
            <div class="stat-item">資金: $<span id="money">0</span></div>
            <div class="stat-item">名聲: <span id="fame">0</span></div>
            <div class="stat-item">技師人數: <span id="mechanics">0</span></div>
        </header>

        <main class="game-content">
            <section class="work-area">
                <h2>車庫維修區</h2>
                <div class="bike-display">
                    <div id="status-text">準備就緒</div>
                </div>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <button id="repair-btn" class="main-btn">開始保養維修</button>
            </section>

            <section class="shop-area">
                <h2>精品改裝店</h2>
                <div id="upgrade-list">
                    </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
